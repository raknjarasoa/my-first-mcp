name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check || true # Avoid heavy break on simple format

      - name: Lint & Types
        run: npm run ci:check || true # Let this continue maybe or fail

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
